<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sara365 Landing Page</title>
    <!-- Meta Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '919261284268755');
    </script>
    <script>
      // CAPI Integration
      (function() {
        var PIXEL_ID = '919261284268755';
        var CAPI_TOKEN = 'EAAjCezCukqABRDqNZCHLznuaZCylzlRkAmIorzrogZBznJguGdqsrBHPjP38FAgHfIzZAHu6WOTkaAZAAZBOiNe2ZBtQWpZAVsPunFSOeALmPGvufcuCYX4pkq1cRZCmj7J1RvOnBNUtTTaVoIKfugJjZAH4yqQ50CwTDxvMMAVZBG67XTaLfQMIYNrxe8smMK4TgZDZD';
        
        function getCookie(name) {
          var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
          if (match) return match[2];
          return null;
        }

        function generateEventId() {
          return 'evt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        window.trackEventWithCAPI = function(eventName, eventData) {
          var eventId = generateEventId();
          
          // Fire client-side pixel
          if (window.fbq) {
            window.fbq('track', eventName, eventData, { eventID: eventId });
          }

          // Fire server-side CAPI
          var payload = {
            data: [
              {
                event_name: eventName,
                event_time: Math.floor(Date.now() / 1000),
                action_source: 'website',
                event_source_url: window.location.href,
                event_id: eventId,
                user_data: {
                  client_user_agent: navigator.userAgent,
                  fbp: getCookie('_fbp'),
                  fbc: getCookie('_fbc')
                },
                custom_data: eventData || {}
              }
            ]
          };

          fetch('https://graph.facebook.com/v19.0/' + PIXEL_ID + '/events?access_token=' + CAPI_TOKEN, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          }).catch(function(e) { console.error('CAPI Error:', e); });
        };

        // Track PageView
        window.trackEventWithCAPI('PageView');
      })();
    </script>
    <!-- End Meta Pixel Code -->
  </head>

</html>
